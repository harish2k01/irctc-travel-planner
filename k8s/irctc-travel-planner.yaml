apiVersion: v1
kind: Namespace
metadata:
  name: irctc-travel-planner
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: irctc-travel-planner-config
  namespace: irctc-travel-planner
data:
  NEXT_PUBLIC_APP_URL: https://irctc-travel-planner.k8s.harish2k01.xyz
  NEXT_PUBLIC_USE_DEMO_DATA: "false"
  OBJECT_STORAGE_BUCKET: irctc-travel-planner-attachments
  PNR_PROVIDER_URL: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: irctc-travel-planner-postgres-data
  namespace: irctc-travel-planner
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: irctc-travel-planner-postgres
  namespace: irctc-travel-planner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: irctc-travel-planner-postgres
  template:
    metadata:
      labels:
        app: irctc-travel-planner-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: irctc-travel-planner-secrets
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - irctc
                - -d
                - irctc
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: irctc-travel-planner-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: irctc-travel-planner-postgres
  namespace: irctc-travel-planner
spec:
  selector:
    app: irctc-travel-planner-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: batch/v1
kind: Job
metadata:
  name: irctc-travel-planner-db-setup
  namespace: irctc-travel-planner
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:18-alpine
          envFrom:
            - secretRef:
                name: irctc-travel-planner-secrets
          command:
            - sh
            - -c
            - until pg_isready -h irctc-travel-planner-postgres -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 2; done
      containers:
        - name: db-setup
          image: ghcr.io/harish2k01/irctc-travel-planner:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: irctc-travel-planner-secrets
            - configMapRef:
                name: irctc-travel-planner-config
          env:
            - name: INCLUDE_DEMO_JOURNEYS
              value: "false"
            - name: INCLUDE_DEMO_HOLIDAYS
              value: "false"
          command:
            - sh
            - -c
            - npx prisma db push && npm run prisma:seed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: irctc-travel-planner-web
  namespace: irctc-travel-planner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: irctc-travel-planner-web
  template:
    metadata:
      labels:
        app: irctc-travel-planner-web
    spec:
      containers:
        - name: web
          image: ghcr.io/harish2k01/irctc-travel-planner:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: irctc-travel-planner-secrets
            - configMapRef:
                name: irctc-travel-planner-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: irctc-travel-planner-web
  namespace: irctc-travel-planner
spec:
  selector:
    app: irctc-travel-planner-web
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: irctc-travel-planner-web
  namespace: irctc-travel-planner
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - irctc-travel-planner.k8s.harish2k01.xyz
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: irctc-travel-planner-web
          port: 80
