apiVersion: v1
kind: Namespace
metadata:
  name: ticket-tracker-test
---
apiVersion: v1
kind: Secret
metadata:
  name: ticket-tracker-secrets
  namespace: ticket-tracker-test
type: Opaque
stringData:
  POSTGRES_DB: tickettracker
  POSTGRES_USER: tickettracker
  POSTGRES_PASSWORD: change-me-before-apply
  DATABASE_URL: postgresql://tickettracker:change-me-before-apply@ticket-tracker-postgres:5432/tickettracker?schema=public
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ticket-tracker-config
  namespace: ticket-tracker-test
data:
  NEXT_PUBLIC_APP_URL: https://ticket-tracker.k8s.harish2k01.xyz
  NEXT_PUBLIC_USE_DEMO_DATA: "false"
  OBJECT_STORAGE_BUCKET: ticket-tracker-test-attachments
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ticket-tracker-postgres-data
  namespace: ticket-tracker-test
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-tracker-postgres
  namespace: ticket-tracker-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticket-tracker-postgres
  template:
    metadata:
      labels:
        app: ticket-tracker-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: ticket-tracker-secrets
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - tickettracker
                - -d
                - tickettracker
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ticket-tracker-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: ticket-tracker-postgres
  namespace: ticket-tracker-test
spec:
  selector:
    app: ticket-tracker-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ticket-tracker-db-setup
  namespace: ticket-tracker-test
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:18-alpine
          envFrom:
            - secretRef:
                name: ticket-tracker-secrets
          command:
            - sh
            - -c
            - until pg_isready -h ticket-tracker-postgres -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 2; done
      containers:
        - name: db-setup
          image: ghcr.io/harish2k01/irctc-travel-planner:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: ticket-tracker-secrets
            - configMapRef:
                name: ticket-tracker-config
          env:
            - name: INCLUDE_DEMO_JOURNEYS
              value: "false"
          command:
            - sh
            - -c
            - npx prisma db push && npm run prisma:seed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-tracker-web
  namespace: ticket-tracker-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticket-tracker-web
  template:
    metadata:
      labels:
        app: ticket-tracker-web
    spec:
      containers:
        - name: web
          image: ghcr.io/harish2k01/irctc-travel-planner:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: ticket-tracker-secrets
            - configMapRef:
                name: ticket-tracker-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ticket-tracker-web
  namespace: ticket-tracker-test
spec:
  selector:
    app: ticket-tracker-web
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ticket-tracker-web
  namespace: ticket-tracker-test
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - ticket-tracker.k8s.harish2k01.xyz
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ticket-tracker-web
          port: 80
