services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: commuterail
      POSTGRES_PASSWORD: change-me
      POSTGRES_DB: commuterail
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commuterail -d commuterail"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://commuterail:change-me@postgres:5432/commuterail?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
